name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - name: Check bundle is up to date
        run: |
          git diff --exit-code bundle/ || {
            echo "::error::bundle/ is out of date. Run 'pnpm build' and commit the result."
            exit 1
          }
